<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiveTask — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #FFFBEB;
      color: #1F2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.95rem;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      background: #F59E0B;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.65rem 1.75rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 200ms;
      text-decoration: none;
    }
    .btn:hover { background: #D97706; }
    .logo {
      font-size: 0.85rem;
      color: #9CA3AF;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
      font-weight: 600;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐝</div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again. Your cached tasks are still viewable.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="logo">HiveTask</div>
  </div>
</body>
</html>
